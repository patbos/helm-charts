name: Lint and Test Charts

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
    paths:
      - 'charts/**'
  pull_request:
    paths:
      - 'charts/**'

jobs:
  lint-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run chart-testing (lint)
        uses: helm/chart-testing-action@v2.8.0
        with:
          command: lint
          config: .github/ct.yaml
